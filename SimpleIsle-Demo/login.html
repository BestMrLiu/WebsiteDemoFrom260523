<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 & 注册 · SimpleIsle</title>
<link rel="stylesheet" href="css/style.css">
</head>
<style>
  body {
    background: var(--cream);
  }

  /* Layout */
  .login-page {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
  }

  /* Left Panel - Image */
  .login-left {
    position: relative;
    overflow: hidden;
  }

  .login-left-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.75) saturate(0.8);
    transition: transform 8s ease;
  }

  .login-left:hover .login-left-img {
    transform: scale(1.03);
  }

  .login-left-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      160deg,
      rgba(58, 54, 50, 0.3) 0%,
      rgba(92, 86, 80, 0.2) 100%
    );
  }

  .login-left-content {
    position: absolute;
    bottom: 60px;
    left: 60px;
    right: 60px;
    color: white;
  }

  .login-left-content .divider {
    background: rgba(250, 247, 242, 0.5);
  }

  .login-left-content h2 {
    font-family: var(--font-serif);
    font-size: 2.2rem;
    font-weight: 300;
    line-height: 1.4;
    margin: 16px 0;
    color: white;
  }

  .login-left-content p {
    font-size: 0.9rem;
    color: rgba(255, 255, 255, 0.75);
    font-weight: 300;
    line-height: 1.8;
  }

  .login-left-quote {
    font-family: var(--font-serif);
    font-size: 0.82rem;
    font-style: italic;
    color: rgba(255, 255, 255, 0.55);
    margin-top: 12px;
  }

  /* Decorative circle */
  .login-deco {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.15);
    pointer-events: none;
  }

  .login-deco-1 {
    width: 200px;
    height: 200px;
    top: 60px;
    right: 40px;
    animation: float 6s ease-in-out infinite;
  }

  .login-deco-2 {
    width: 120px;
    height: 120px;
    bottom: 120px;
    right: 100px;
    animation: float 8s ease-in-out infinite reverse;
  }

  /* Right Panel - Form */
  .login-right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    background: var(--cream);
    overflow-y: auto;
  }

  .login-panel {
    width: 100%;
    max-width: 360px;
  }

  /* Logo */
  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    font-family: var(--font-serif);
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--charcoal);
  }

  .login-logo-icon {
    width: 40px;
    height: 40px;
    background: var(--sage);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: white;
  }

  /* Tabs */
  .login-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 1.5px solid var(--warm-gray-light);
  }

  .login-tab {
    padding: 12px 0;
    margin-right: 32px;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--warm-gray);
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    margin-bottom: -1.5px;
    transition: all var(--duration-fast) var(--ease);
    font-family: var(--font-sans);
  }

  .login-tab.active {
    color: var(--charcoal);
    border-bottom-color: var(--charcoal);
    font-weight: 600;
  }

  .login-tab:hover:not(.active) {
    color: var(--charcoal-light);
  }

  /* Form */
  .login-form,
  .register-form {
    display: none;
  }

  .login-form.active,
  .register-form.active {
    display: block;
    animation: fadeUp 0.4s var(--ease-out);
  }

  .form-title {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 6px;
  }

  .form-sub {
    font-size: 0.88rem;
    color: var(--warm-gray);
    margin-bottom: 20px;
    font-weight: 300;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 8px;
    letter-spacing: 0.03em;
  }

  .form-input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--warm-gray-light);
    border-radius: var(--radius-md);
    font-family: var(--font-sans);
    font-size: 0.9rem;
    color: var(--charcoal);
    background: var(--white);
    transition: border-color var(--duration-fast) var(--ease), box-shadow var(--duration-fast) var(--ease);
    outline: none;
  }

  .form-input:focus {
    border-color: var(--sage);
    box-shadow: 0 0 0 3px rgba(139, 158, 139, 0.15);
  }

  .form-input::placeholder {
    color: var(--warm-gray-light);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .form-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    font-size: 0.82rem;
  }

  .form-check {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--warm-gray);
  }

  .form-check input {
    width: 15px;
    height: 15px;
    accent-color: var(--sage);
    cursor: pointer;
  }

  .form-link {
    color: var(--sage-dark);
    font-weight: 600;
    cursor: pointer;
  }

  .form-link:hover {
    color: var(--charcoal);
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--charcoal);
    color: var(--cream);
    border: none;
    border-radius: var(--radius-full);
    font-family: var(--font-sans);
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--duration-fast) var(--ease);
    letter-spacing: 0.05em;
  }

  .btn-login:hover {
    background: var(--sage);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .form-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px 0;
    font-size: 0.8rem;
    color: var(--warm-gray);
  }

  .form-divider::before,
  .form-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--warm-gray-light);
  }

  .social-login {
    display: flex;
    gap: 10px;
  }

  .social-btn {
    flex: 1;
    padding: 10px;
    border: 1.5px solid var(--warm-gray-light);
    border-radius: var(--radius-md);
    background: var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--charcoal);
    transition: all var(--duration-fast) var(--ease);
    font-family: var(--font-sans);
  }

  .social-btn:hover {
    border-color: var(--sage);
    background: rgba(139, 158, 139, 0.06);
    transform: translateY(-1px);
  }

  .switch-text {
    text-align: center;
    font-size: 0.88rem;
    color: var(--warm-gray);
    margin-top: 16px;
  }

  .switch-text a {
    color: var(--charcoal);
    font-weight: 600;
    cursor: pointer;
    border-bottom: 1px solid var(--warm-gray-light);
  }

  .switch-text a:hover {
    color: var(--sage-dark);
    border-bottom-color: var(--sage);
  }

  /* Password strength */
  .strength-bar-row {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  .strength-bar {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--warm-gray-light);
    transition: background var(--duration-fast) var(--ease);
  }

  .strength-bar.active.weak { background: #C17F59; }
  .strength-bar.active.medium { background: var(--clay); }
  .strength-bar.active.strong { background: var(--sage); }

  .strength-label {
    font-size: 0.72rem;
    font-weight: 600;
    margin-top: 4px;
  }

  .strength-label.weak { color: var(--terracotta); }
  .strength-label.medium { color: var(--clay); }
  .strength-label.strong { color: var(--sage-dark); }

  /* Success */
  .form-success {
    display: none;
    text-align: center;
    padding: 20px 0;
  }

  .form-success.show {
    display: block;
    animation: fadeUp 0.5s var(--ease-out);
  }

  .success-icon {
    width: 64px;
    height: 64px;
    background: rgba(139, 158, 139, 0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 1.6rem;
  }

  .success-title {
    font-family: var(--font-serif);
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .success-desc {
    font-size: 0.88rem;
    color: var(--warm-gray);
    margin-bottom: 20px;
  }

  /* Mobile */
  @media (max-width: 900px) {
    .login-page {
      grid-template-columns: 1fr;
    }

    .login-left {
      height: 30vh;
      min-height: 200px;
    }

    .login-left-content {
      left: 24px;
      right: 24px;
      bottom: 24px;
    }

    .login-left-content h2 {
      font-size: 1.3rem;
    }

    .login-left-deco { display: none; }

    .login-right {
      padding: 32px 20px;
      align-items: flex-start;
      max-height: none;
    }

    .login-panel {
      margin: 0;
    }

    .form-row {
      grid-template-columns: 1fr;
    }
    
    .login-logo {
      margin-bottom: 32px;
    }
    
    .login-tabs {
      margin-bottom: 28px;
    }
  }
</style>
<body>

<div class="login-page">
  <!-- Left -->
  <div class="login-left">
    <img src="images/hero.jpg" alt="" class="login-left-img">
    <div class="login-left-overlay"></div>
    <div class="login-deco login-deco-1"></div>
    <div class="login-deco login-deco-2"></div>
    <div class="login-left-content">
      <div class="divider"></div>
      <h2>少即是多<br>在简单中找到生活的质感</h2>
      <p>SimpleIsle 极简岛，陪你探索低欲望生活的美好。在这里，每一次分享都是一次心灵的重塑。</p>
      <div class="login-left-quote">"生活的艺术，在于懂得删繁就简。"</div>
    </div>
  </div>

  <!-- Right -->
  <div class="login-right">
    <div class="login-panel">

      <div class="login-logo">
        <div class="login-logo-icon">岛</div>
        SimpleIsle
      </div>

      <!-- Tabs -->
      <div class="login-tabs">
        <button class="login-tab active" data-tab="login">登录</button>
        <button class="login-tab" data-tab="register">注册</button>
      </div>

      <!-- Login Form -->
      <form class="login-form active" id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-title">欢迎回来</div>
        <div class="form-sub">登录你的极简岛账户</div>

        <div class="form-group">
          <label class="form-label">邮箱 / 用户名</label>
          <input type="text" class="form-input" placeholder="输入邮箱或用户名" required>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" placeholder="输入密码" required>
        </div>

        <div class="form-options">
          <label class="form-check">
            <input type="checkbox"> 记住我
          </label>
          <span class="form-link" onclick="showMsg('密码重置功能开发中')">忘记密码？</span>
        </div>

        <button type="submit" class="btn-login">登 录</button>

        <div class="form-divider">或</div>

        <div class="social-login">
          <button type="button" class="social-btn" onclick="showMsg('微信登录开发中')">
            <span>💬</span> 微信
          </button>
          <button type="button" class="social-btn" onclick="showMsg('微博登录开发中')">
            <span>📧</span> 微博
          </button>
        </div>
      </form>

      <!-- Register Form -->
      <form class="register-form" id="registerForm" onsubmit="return handleRegister(event)">
        <div class="form-title">开启极简之旅</div>
        <div class="form-sub">加入 SimpleIsle，发现简单生活的力量</div>

        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" class="form-input" placeholder="给自己起个极简昵称" required>
        </div>

        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-input" placeholder="输入常用邮箱" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">性别</label>
            <select class="form-input">
              <option value="">选择</option>
              <option>女</option>
              <option>男</option>
              <option>保密</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">生日</label>
            <input type="date" class="form-input">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="regPassword" placeholder="至少 8 位" required minlength="8" oninput="checkStrength(this.value)">
          <div class="strength-bar-row">
            <div class="strength-bar" id="s1"></div>
            <div class="strength-bar" id="s2"></div>
            <div class="strength-bar" id="s3"></div>
            <div class="strength-bar" id="s4"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="form-group">
          <label class="form-label">确认密码</label>
          <input type="password" class="form-input" placeholder="再输一次密码" required>
        </div>

        <div class="form-options">
          <label class="form-check">
            <input type="checkbox" required> 我已阅读并同意
          </label>
          <span class="form-link">服务条款</span>
        </div>

        <button type="submit" class="btn-login">立即注册</button>
      </form>

      <!-- Success -->
      <div class="form-success" id="regSuccess">
        <div class="success-icon">🌿</div>
        <div class="success-title">注册成功！</div>
        <div class="success-desc">欢迎加入 SimpleIsle，3 秒后跳转首页...</div>
        <a href="index.html" class="btn btn-primary btn-full">开始探索 →</a>
      </div>

    </div>
  </div>
</div>

<script>
  // Tab switching
  document.querySelectorAll('.login-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.login-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      var isLogin = this.dataset.tab === 'login';
      document.getElementById('loginForm').classList.toggle('active', isLogin);
      document.getElementById('registerForm').classList.toggle('active', !isLogin);
      document.getElementById('regSuccess').classList.remove('show');
    });
  });

  // Password strength
  function checkStrength(pwd) {
    var bars = [
      document.getElementById('s1'),
      document.getElementById('s2'),
      document.getElementById('s3'),
      document.getElementById('s4')
    ];
    var label = document.getElementById('strengthLabel');
    var score = 0;
    if (pwd.length >= 8) score++;
    if (pwd.length >= 10 && /[A-Za-z]/.test(pwd)) score++;
    if (/\d/.test(pwd)) score++;
    if (/[!@#$%^&*()]/.test(pwd)) score++;
    var levels = ['', 'weak', 'weak', 'medium', 'strong'];
    var texts = ['', '简单', '一般', '良好', '非常强'];
    bars.forEach(function(bar, i) {
      bar.classList.remove('active', 'weak', 'medium', 'strong');
      if (i < score) {
        bar.classList.add('active', levels[score]);
      }
    });
    label.className = 'strength-label ' + (levels[score] || '');
    label.textContent = score > 0 ? texts[score] : '';
  }

  // Login
  function handleLogin(e) {
    e.preventDefault();
    showMsg('登录成功，正在跳转...', function() {
      window.location.href = 'index.html';
    });
  }

  // Register
  function handleRegister(e) {
    e.preventDefault();
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('regSuccess').classList.add('show');
    setTimeout(function() {
      window.location.href = 'index.html';
    }, 3000);
  }

  // Toast
  function showMsg(msg, cb) {
    var old = document.querySelector('.toast-simple');
    if (old) old.remove();
    var el = document.createElement('div');
    el.className = 'toast-simple';
    el.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:#3A3632;color:#FAF7F2;padding:12px 28px;border-radius:999px;font-family:var(--font-sans);font-size:0.88rem;z-index:9999;transition:all 0.3s ease;white-space:nowrap';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() {
      el.style.transform = 'translateX(-50%) translateY(0)';
    }, 10);
    setTimeout(function() {
      el.style.opacity = '0';
      setTimeout(function() {
        el.remove();
        if (cb) cb();
      }, 300);
    }, 2000);
  }
</script>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom" style="border:none;padding:0">
      <span>© 2026 SimpleIsle · 少即是多</span>
      <span style="font-size:0.72rem;color:var(--warm-gray)">源码来自小红书「代号大学生」，仅供参考学习交流使用</span>
    </div>
  </div>
</footer>
</body>
</html>
